project:
  type: website
  output-dir: _site
  resources:
    - assets/data/**
    - assets/figures/**

website:
  title: "Patents, Papers, Parts & Planet"
  description: "Tracing synthetic biology innovation from student projects to patents"
  site-url: "https://zer0juice.github.io/synbiomap"
  repo-url: "https://github.com/Zer0Juice/synbiomap"
  repo-actions: [issue]

  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: results.qmd
        text: Results
      - href: case-study.qmd
        text: "Carbon Capture"
      - href: methods.qmd
        text: "Methods & Data"
      - href: paper.qmd
        text: Paper
      - href: slides.qmd
        text: Slides

  page-footer:
    left: "CSH Thesis Project — Synthetic Biology Innovation"
    right:
      - icon: github
        href: "https://github.com/Zer0Juice/synbiomap"

format:
  html:
    theme: [cosmo, assets/solarized-light.scss]
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    highlight-style: solarized

execute:
  freeze: auto  # only re-render notebooks when their source changes
