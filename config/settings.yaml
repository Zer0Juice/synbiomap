# ============================================================
# Pipeline configuration
# Edit this file to change keywords, model choices, and limits.
# ============================================================

# --- Corpus construction ---
# Papers and patents are retrieved in three layers, based on:
#   Shapira, Kwon & Youtie (2017) "Tracking the emergence of synthetic
#   biology." Scientometrics 112(3), pp. 1457–1478.
#
# The key principle: synthetic biology is a self-identifying community,
# so the primary signal is the term itself. Broad terms like "metabolic
# engineering" are NOT used for retrieval — they would swamp the corpus
# with unrelated work. They appear only as post-hoc classification labels.

corpus:

  # Layer 1 — Core self-identifying terms (narrow, high precision).
  # Papers using these terms are almost certainly within synthetic biology.
  # This is the seed set for citation expansion.
  core_keywords:
    - "synthetic biology"
    - "synthetic genomics"
    - "synthetic genome"

  # Layer 2 — Subfield terms (broader, catches work predating the label).
  # Many foundational synthetic biology papers were published before the
  # field adopted the "synthetic biology" name, or come from adjacent
  # subfields that closely identify with it.
  subfield_keywords:
    - "synthetic gene network"
    - "synthetic gene circuit"
    - "synthetic genetic circuit"
    - "synthetic cell"
    - "minimal genome"
    - "minimal cell"
    - "standard biological parts"
    - "artificial genetic system"
    - "BioBrick"
    - "genetic toggle switch"
    - "repressilator"
    - "orthogonal genetic"
    - "xenobiology"
    - "cell-free synthetic biology"

  # Layer 3 — Citation expansion from Layer 1 seed papers.
  # For each Layer 1 paper we fetch its cited references (backward snowball)
  # and the papers that cite it (forward snowball). This captures related
  # work that uses different terminology.
  # Set enabled: false to skip this step (much faster, smaller corpus).
  citation_expansion:
    enabled: false
    max_references_per_paper: 200   # backward: papers cited by each seed
    max_citing_per_paper: 200       # forward: papers citing each seed
    layer1_only: true               # only expand from core keyword hits

  # Carbon capture keywords — used for CASE STUDY TAGGING only, not retrieval.
  # These are applied after the corpus is built to flag the carbon-capture
  # subset. Matching any one keyword sets case_study_flag = True.
  carbon_capture_keywords:
    - "carbon capture"
    - "carbon sequestration"
    - "CO2 fixation"
    - "carbon dioxide fixation"
    - "carbon dioxide reduction"
    - "carbon neutral"
    - "biofuel"
    - "carbon cycle"
    - "autotrophic"
    - "RuBisCO"
    - "Calvin cycle"
    - "carboxylase"
    - "carbon concentrating mechanism"
    - "photorespiration"

  # Minimum year for inclusion (inclusive)
  year_min: 2000
  # Maximum year for inclusion (inclusive); set to null for no limit
  year_max: null

  # Maximum results per keyword query (across all layers)
  openalex_max_results: 5000
  # Maximum patents to retrieve from Lens.org (per layer query)
  lens_max_results: 2000

  # Patent-specific configuration
  # IPC (International Patent Classification) codes used to scope the patent search.
  # Synthetic biology has no dedicated IPC code, so we use the relevant technical
  # classes and combine them with keywords (AND logic) to reduce false positives.
  # Source: van Doren, Koenigstein & Reiss (2013, Systems and Synthetic Biology)
  #   C12N — Micro-organisms; mutation or genetic engineering (core)
  #   C12P — Fermentation or enzyme-using processes
  #   C12Q — Measuring/testing processes involving enzymes or nucleic acids
  #   C12S — Processes using enzymes or micro-organisms (older code, now merged)
  #   C40B — Combinatorial chemistry; gene/peptide libraries
  patent_ipc_codes:
    - "C12N"
    - "C12P"
    - "C12Q"
    - "C12S"
    - "C40B"

  # Layer 1 patent keywords — core self-identifying terms (AND with IPC codes)
  patent_core_keywords:
    - "synthetic biology"
    - "synthetic genomics"
    - "synthetic genome"

  # Layer 2 patent keywords — engineering and enabling technology terms
  # Based on van Doren et al. (2013) three-part keyword strategy.
  # Applied WITH the IPC filter to stay within the technical scope.
  patent_subfield_keywords:
    - "genetic circuit"
    - "synthetic gene circuit"
    - "gene synthesis"
    - "DNA assembly"
    - "BioBrick"
    - "cell-free synthetic"
    - "synthetic gene network"
    - "minimal genome"
    - "orthogonal genetic"
    - "metabolic pathway engineering"

# --- Embedding model ---
# We use a sentence-transformer model that encodes short texts well.
# "all-MiniLM-L6-v2" is fast and performs well on scientific abstracts.
# For higher quality, try "allenai-specter" (trained on scientific papers).
# Reference: Reimers & Gurevych (2019) "Sentence-BERT: Sentence Embeddings
#            using Siamese BERT-Networks." EMNLP 2019.
embedding:
  model: "all-MiniLM-L6-v2"
  batch_size: 64
  # Text field to embed (combined title + abstract)
  text_field: "text"

# --- Dimensionality reduction ---
# UMAP reduces high-dimensional embeddings to 2D for visualization.
# Reference: McInnes et al. (2018) "UMAP: Uniform Manifold Approximation
#            and Projection for Dimension Reduction." arXiv:1802.03426.
umap:
  n_components: 2
  n_neighbors: 15
  min_dist: 0.1
  metric: "cosine"
  random_state: 42

# --- Clustering ---
# HDBSCAN finds clusters of variable density without requiring a fixed
# number of clusters. Noise points are labeled -1.
# Reference: Campello et al. (2013) "Density-Based Clustering Based on
#            Hierarchical Density Estimates." ECML PKDD 2013.
clustering:
  min_cluster_size: 10
  min_samples: 5
  metric: "euclidean"  # applied to UMAP-reduced coordinates

# --- Case study tagging ---
# Artifacts are tagged as carbon-capture case study items if their
# title+abstract contain at least one keyword AND the confidence
# threshold (fraction of keywords matched) exceeds this value.
case_study:
  confidence_threshold: 0.0  # any keyword match qualifies
  flag_field: "case_study_flag"
  confidence_field: "case_study_confidence"

# --- Geocoding ---
# Nominatim is the free OpenStreetMap geocoder.
# Set provider to "opencage" to use OpenCage (requires API key in .env).
geocoding:
  provider: "nominatim"
  user_agent: "synbio-patents-papers-parts"
  cache_file: "data/geo/geocoding_cache.json"

# --- Output paths ---
output:
  processed_dir: "data/processed"
  embeddings_file: "data/embeddings/embeddings.json"
  projections_file: "data/embeddings/projections.json"
  clusters_file: "data/embeddings/clusters.json"
  website_data_dir: "website/assets/data"
