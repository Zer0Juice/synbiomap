corpus:
  core_keywords:
  - synthetic biology
  - synthetic genomics
  - synthetic genome
  - BioBrick
  subfield_keywords:
  - synthetic gene network
  - synthetic gene circuit
  - synthetic genetic circuit
  - synthetic cell
  - minimal genome
  - minimal cell
  - standard biological parts
  - artificial genetic system
  - genetic toggle switch
  - repressilator
  - orthogonal genetic
  - xenobiology
  - cell-free synthetic biology
  citation_expansion:
    enabled: false
    max_references_per_paper: 200
    max_citing_per_paper: 200
    layer1_only: true
  reference_seed_expansion:
    enabled: true
    max_citing_per_seed: 5000
    seeds:
    - doi: 10.1186/1754-1611-2-5
      label: BioBrick vectors paper (Shetty et al. 2008)
    - doi: 10.1038/nbt1109-1099
      label: iGEM and BioBricks Foundation (Smolke 2009)
  carbon_capture_keywords:
  - carbon capture
  - carbon sequestration
  - CO2 fixation
  - carbon dioxide fixation
  - carbon dioxide reduction
  - carbon neutral
  - biofuel
  - carbon cycle
  - autotrophic
  - RuBisCO
  - Calvin cycle
  - carboxylase
  - carbon concentrating mechanism
  - photorespiration
  year_min: 2000
  year_max: null
  openalex_max_results: 5000
  lens_max_results: 2000
  patent_ipc_codes:
  - C12N
  - C12P
  - C12Q
  - C12S
  - C40B
  patent_core_keywords:
  - synthetic biology
  - synthetic genomics
  - synthetic genome
  patent_subfield_keywords:
  - genetic circuit
  - synthetic gene circuit
  - gene synthesis
  - DNA assembly
  - BioBrick
  - cell-free synthetic
  - synthetic gene network
  - minimal genome
  - orthogonal genetic
  - metabolic pathway engineering
embedding:
  model: allenai-specter
  batch_size: 256
  text_field: text
umap:
  n_components_cluster: 30
  n_components_viz: 2
  n_neighbors: 10
  min_dist: 0.05
  metric: cosine
  random_state: 42
clustering:
  min_cluster_size: 10
  min_samples: 1
  metric: euclidean
case_study:
  confidence_threshold: 0.0
  flag_field: case_study_flag
  confidence_field: case_study_confidence
geocoding:
  provider: nominatim
  user_agent: synbio-patents-papers-parts
  cache_file: data/geo/geocoding_cache.json
output:
  processed_dir: data/processed
  embeddings_file: data/embeddings/embeddings.json
  projections_file: data/embeddings/projections.json
  clusters_file: data/embeddings/clusters.json
  website_data_dir: website/assets/data
labeling:
  model: claude-haiku-4-5-20251001
  sample_size: 20
  batch_size: 10
  cache_file: data/embeddings/cluster_labels.json
  subclustering:
    enabled: false
    size_threshold: 100
    min_cluster_size: 15
    min_samples: 5
    cache_file: data/embeddings/subcluster_labels.json
